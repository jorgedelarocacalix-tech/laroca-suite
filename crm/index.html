<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef2f7;color:#2d3748;font-size:18px;min-height:100vh;line-height:1.5}
button,input,select,textarea{font-family:inherit;outline:none;border:none}
button{cursor:pointer}

.scr{display:none;min-height:100vh}.scr.on{display:flex}

@media(max-width:780px){.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}.sb-ov.open{display:block}.main{margin-left:0}.hburg{display:flex}.cards-grid{grid-template-columns:1fr!important}.ch2{grid-template-columns:1fr!important}.frow,.contact-row{grid-template-columns:1fr!important}.kb-rotate-hint{display:flex!important}}

  if(u){err.textContent='';CU=u;pinBuf='';renderPD();document.getElementById('s-login').classList.remove('on');launchApp();return;}
  // Fallback: buscar en Supabase si no está en caché local
  err.textContent='Verificando...';
  var pb=pinBuf;pinBuf='';renderPD();
  sbF('usuarios','GET',null,'?pin=eq.'+pb+'&select=*').then(function(rows){
    if(!rows||!rows.length){err.textContent='PIN incorrecto';shk();return;}

  }).catch(function(){err.textContent='PIN incorrecto';shk();});
}

function getCarterasVend(){
  // Returns array of cartera IDs for current user
  if(!CU)return DB.carteras.map(function(x){return x.id;});
  if(CU.role==='admin'||CU.role==='subadmin'){
    return DB.carteras.map(function(x){return x.id;});
  }
  var cart=CU.cartera;
  if(!cart||cart.length===0)return DB.carteras.map(function(x){return x.id;});
  return Array.isArray(cart)?cart:[cart];
}
function getActiveVendedor(clientId){
  // Admin and subadmin never see blocks
  if(!CU||CU.role==='admin'||CU.role==='subadmin')return null;
  var allCalls=DB.calls.filter(function(c){return c.clientId===clientId;});
  if(!allCalls.length)return null;
  // Sort by most recent first
  allCalls.sort(function(a,b){
    var da=a.dateISO?new Date(a.dateISO):new Date(0);
    var db=b.dateISO?new Date(b.dateISO):new Date(0);
    return db-da;
  });
  var last=allCalls[0];
  // If last gestión is 'perdido', client is free
  if(last.estado==='perdido')return null;
  var lastVend=(last.userName||last.userId||'').trim().toLowerCase();
  var curUser=(CU.name||'').trim().toLowerCase();
  // If I was the last one to manage, not blocked
  if(lastVend===curUser)return null;
  return last.userName||last.userId;
}


function getPool(){
  var myCids=getCarterasVend();
  var cids;
  if(activeCart){
    // Respect activeCart; vendedor can only access their own carteras
    if(CU.role==='vendedor'){
      cids=myCids.indexOf(activeCart)>=0?[activeCart]:[];
    } else {
      cids=[activeCart];
    }
  } else {
    cids=CU.role==='vendedor'?myCids:DB.carteras.map(function(x){return x.id;});
  }
  return cids.flatMap(function(cid){
    var cn=(DB.carteras.find(function(x){return x.id===cid;})||{name:''}).name;
    return(DB.clients[cid]||[]).map(function(c){return Object.assign({},c,{_cid:cid,_cn:cn});});
  });
}
function buildCartPills(cur,fn,pid){var h='<div class="filter-row" id="'+(pid||'cp-'+fn)+'"><div class="ytab '+(cur===null?'on':'')+'" onclick="'+fn+'(null,this)">Todas</div>';DB.carteras.forEach(function(c){h+='<div class="ytab '+(cur===c.id?'on':'')+'" data-cid="'+c.id+'" onclick="'+fn+'(this.dataset.cid,this)">'+c.name+'</div>';});return h+'</div>';}
function buildVendPills(cur,fn,pid,cid,customCounts){
  var vendUsers=DB.users.filter(function(u){return u.role==='vendedor'||u.role==='subadmin';});
  var calls=cid?DB.calls.filter(function(c){return c.carteraId===cid;}):DB.calls;
  var vendMap={};
  vendUsers.forEach(function(u){
    if(!u.name)return;
    var key=u.name.trim().toLowerCase();
    if(!vendMap[key])vendMap[key]={display:u.name.trim(),count:0};
  });
  if(customCounts){
    // Use caller-supplied counts (e.g. Kanban clients/leads per vendor)
    Object.keys(customCounts).forEach(function(name){
      var key=name.trim().toLowerCase();
      if(!vendMap[key])vendMap[key]={display:name.trim(),count:0};
      vendMap[key].count=customCounts[name]||0;
    });
  } else {
    calls.forEach(function(c){
      var raw=c.userName||c.userId||'';
      var key=raw.trim().toLowerCase();
      if(!key)return;
      if(!vendMap[key])vendMap[key]={display:raw.trim(),count:0};
      vendMap[key].count++;
    });
  }
  var allVends=Object.values(vendMap).sort(function(a,b){return a.display.localeCompare(b.display);});
  if(!allVends.length)return '';
  var curNorm=cur?(cur.trim().toLowerCase()):null;
  var h='<div class="filter-row" id="'+(pid||'vp-'+fn)+'">';
  h+='<div class="ytab '+(cur===null?'on':'')+'" onclick="'+fn+'(null,this)">👥 Todos</div>';
  allVends.forEach(function(v){
    var isActive=curNorm&&v.display.trim().toLowerCase()===curNorm;
    h+='<div class="ytab '+(isActive?'on':'')+'" data-vend="'+v.display+'" onclick="'+fn+'(this.dataset.vend,this)">👤 '+v.display+(v.count>0?' <span style="background:#5b8dee;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:2px;">'+v.count+'</span>':'')+'</div>';
  });
  return h+'</div>';
}

function renderCards(){
  var grid=document.getElementById('cards-grid');if(!grid)return;
  // Barra de meta para vendedor en vista Clientes
  var _vmb=document.getElementById('vend-meta-bar');
  if(_vmb&&CU.role==='vendedor'){
    var _hoy=monFechaHN(0),_vn=CU.name.trim(),_pool=null;
    for(var _pi=0;_pi<VENDOR_POOLS.length;_pi++){if(VENDOR_POOLS[_pi].carteras.some(function(c){return getCarterasVend().indexOf(c)>=0;})){_pool=VENDOR_POOLS[_pi];break;}}
    var _st=_vendStats(_vn,_hoy,_pool?_pool.carteras:null);
    var _M=8,_pct=Math.min(100,Math.round((_st.callsHoy/_M)*100));
    var _col=_st.callsHoy>=_M?'#276749':_st.callsHoy>=4?'#744210':'#c53030';
    var _bg=_st.callsHoy>=_M?'#f0fff4':_st.callsHoy>=4?'#fffbeb':'#fff5f5';
    var _br=_st.callsHoy>=_M?'#9ae6b4':_st.callsHoy>=4?'#f6d860':'#fed7d7';
    var _bc=_st.callsHoy>=_M?'#48bb78':_st.callsHoy>=4?'#ed8936':'#fc8181';

      '<div style="flex:1;"><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:'+_col+';margin-bottom:5px;">'+
        '<span>📞 Gestiones hoy: '+_st.callsHoy+' / '+_M+'</span>'+
        (_st.callsHoy>=_M?'<span>✅ Meta cumplida</span>':'<span>'+(+(_M-_st.callsHoy))+' para la meta</span>')+
      '</div><div style="background:#e2e8f0;border-radius:6px;height:7px;overflow:hidden;">'+
        '<div style="width:'+_pct+'%;height:100%;background:'+_bc+';border-radius:6px;transition:width .4s;"></div>'+
      '</div></div></div>';
  }

  if(q)cs=cs.filter(function(c){return c.nombre.toLowerCase().includes(q);});
  cs=cs.map(function(c){return Object.assign({},c,score(c));});
  cs.sort(function(a,b){var ua=a.estado==='urgente'?1:0,ub=b.estado==='urgente'?1:0;if(ua!==ub)return ub-ua;return b.s-a.s;});
  if(activeCat!=='all')cs=cs.filter(function(c){return c.cat===activeCat;});
  var rc=document.getElementById('res-ct');if(rc)rc.textContent=cs.length+' clientes';
  if(!cs.length){
  var msg=CU.role==='vendedor'?
    '<div class="empty-st"><div class="ei">👥</div><p style="font-size:15px;font-weight:600;color:#2d3748;margin-bottom:8px;">Sin clientes en tu cartera</p><p style="font-size:13px;color:#718096;">El administrador debe subir el Excel con los clientes de tu cartera.</p></div>':

  grid.innerHTML=msg;
  document.getElementById('pagination')&&(document.getElementById('pagination').innerHTML='');
  return;}
  // Pagination
  var totalPages=Math.ceil(cs.length/clientsPerPage);
  if(clientPage>=totalPages)clientPage=0;
  var start=clientPage*clientsPerPage;
  var pageCs=cs.slice(start,start+clientsPerPage);
  var h='';
  pageCs.forEach(function(c){

function getKbStats(cid,vend){
  var cids=cid?[cid]:(CU.role==='vendedor'?[CU.cartera]:DB.carteras.map(function(x){return x.id;}));
  var allC=cids.flatMap(function(id){return(DB.clients[id]||[]).map(function(c){return Object.assign({},c,{_cid:id});});});
  var managed;
  if(vend){managed=new Set(DB.calls.filter(function(c){return cids.includes(c.carteraId)&&(c.userName||c.userId)===vend;}).map(function(c){return c.clientId;}));}
  else{managed=new Set(DB.calls.filter(function(c){return cids.includes(c.carteraId);}).map(function(c){return c.clientId;}));}
  var rs={};KB.recompra.cols.forEach(function(c){rs[c.id]=0;});
  allC.filter(function(c){return managed.has(c.id)||(c.kbCol&&c.kbCol!=='prospecto');}).forEach(function(c){var col=c.kbCol||'prospecto';if(rs[col]!==undefined)rs[col]++;else rs['prospecto']++;});
  var leads=DB.newLeads||[];if(vend)leads=leads.filter(function(l){return l.createdBy===vend;});
  var ls={};KB.nuevos.cols.forEach(function(c){ls[c.id]=0;});
  leads.forEach(function(l){var col=l.leadCol||'nl';if(ls[col]!==undefined)ls[col]++;else ls['nl']++;});
  return{recompra:rs,nuevos:ls};
}

}

function buildVendTable(cids){
  var hoy=monFechaHN(0);
  var hace7=monFechaHN(-6);
  var seen=new Set();
  var vendors=DB.users.filter(function(u){
    if(u.role!=='vendedor'&&u.role!=='subadmin')return false;
    if(!u.name)return false;
    var k=u.name.trim().toLowerCase();
    if(seen.has(k))return false;
    seen.add(k);return true;
  });
  var rows=[];
  vendors.forEach(function(v){
    var vn=(v.name||'').trim();
    var vCalls=DB.calls.filter(function(c){return c.estado!=='actividad'&&(c.userName||'').trim().toLowerCase()===vn.toLowerCase()&&cids.includes(c.carteraId);});
    var hoyN=vCalls.filter(function(c){return c.dateISO===hoy;}).length;
    var sem=vCalls.filter(function(c){return(c.dateISO||'')>=hace7;}).length;
    var leads=(DB.newLeads||[]).filter(function(l){return(l.assignedTo||l.createdBy||'').trim().toLowerCase()===vn.toLowerCase();});
    var cerrados=leads.filter(function(l){return l.leadCol==='nv';}).length;
    var pct=leads.length?Math.round(cerrados/leads.length*100):0;
    var lastCall=vCalls.sort(function(a,b){return(b.dateISO||'')>(a.dateISO||'')?1:-1;})[0];
    var last=lastCall?lastCall.dateISO:null;
    if(hoyN>0||sem>0||leads.length>0)rows.push({name:vn,hoy:hoyN,sem:sem,leads:leads.length,cerrados:cerrados,pct:pct,last:last});
  });
  if(!rows.length)return '';
  rows.sort(function(a,b){return b.sem-a.sem;});
  var h='<div style="margin-bottom:18px;">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">🏆 Rendimiento del equipo — todas las carteras</div>';
  h+='<div style="background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);">';
  h+='<div style="display:grid;grid-template-columns:1fr 52px 52px 52px 52px 80px;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;padding:7px 12px;border-bottom:1px solid var(--border);letter-spacing:.04em;">';
  h+='<div>Vendedor</div><div style="text-align:center;">Hoy</div><div style="text-align:center;">7d</div><div style="text-align:center;">Leads</div><div style="text-align:center;">Conv%</div><div style="text-align:center;">Activo</div></div>';
  rows.forEach(function(r,i){
    var dago=r.last?(Math.round((new Date(monFechaHN(0)+'T12:00:00Z')-new Date(r.last+'T12:00:00Z'))/86400000)):999;
    var lastTxt=dago===0?'<span style="color:#48bb78;font-weight:700;">Hoy</span>':dago===1?'<span style="color:#48bb78;">Ayer</span>':dago<=4?'<span style="color:#ed8936;">Hace '+dago+'d</span>':'<span style="color:#fc8181;">'+dago+'d</span>';
    var pctColor=r.pct>=40?'#48bb78':r.pct>=20?'#ed8936':'#a0aec0';
    h+='<div onclick="setDashVend(\''+r.name+'\',null)" style="display:grid;grid-template-columns:1fr 52px 52px 52px 52px 80px;padding:8px 12px;border-bottom:'+(i<rows.length-1?'1px solid var(--border)':'none')+';align-items:center;cursor:pointer;transition:background .12s;" onmouseenter="this.style.background=\'#f7f9fc\'" onmouseleave="this.style.background=\'\'">';
    h+='<div style="font-size:12px;font-weight:600;color:var(--t1);">'+r.name+'</div>';
    h+='<div style="text-align:center;font-size:13px;font-weight:700;color:'+(r.hoy>0?'var(--blue)':'var(--t3)')+';">'+r.hoy+'</div>';
    h+='<div style="text-align:center;font-size:13px;font-weight:700;color:var(--t1);">'+r.sem+'</div>';
    h+='<div style="text-align:center;font-size:13px;color:var(--t2);">'+r.leads+'</div>';
    h+='<div style="text-align:center;font-size:12px;font-weight:700;color:'+pctColor+';">'+r.pct+'%</div>';
    h+='<div style="text-align:center;font-size:11px;">'+lastTxt+'</div>';
    h+='</div>';
  });
  h+='</div></div>';
  return h;
}

function vDash(){
  var isA=CU.role!=='vendedor';
  var cartH=isA?buildCartPills(dashCart,'setDashCart','cp-dash'):'';
  var vendH=isA?buildVendPills(dashSelVend,'setDashVend','vp-dash',dashCart,{}):'';

    '<button class="ytab '+(activeDash==='recompra'?'on':'')+'" data-tab="recompra" onclick="setDashTab(this)">📋 Recompra</button>'+
    '<button class="ytab '+(activeDash==='nuevos'?'on':'')+'" data-tab="nuevos" onclick="setDashTab(this)">✨ Clientes Nuevos</button>'+
    '</div>';

  var showNuevos=activeDash==='todos'||activeDash==='nuevos';

  // KPI calculations
  var hoy=monFechaHN(0);
  var callsF=DB.calls.filter(function(c){
    if(c.estado==='actividad')return false;
    if(!cids.includes(c.carteraId))return false;
    if(dashSelVend&&(c.userName||c.userId||'').trim().toLowerCase()!==dashSelVend.trim().toLowerCase())return false;
    return true;
  });
  var gHoy=callsF.filter(function(c){return c.dateISO===hoy;}).length;
  var gSem=callsF.filter(function(c){return(c.dateISO||'')>=monFechaHN(-6);}).length;
  var calientes=(showRecompra?((kbs.recompra.interesado||0)+(kbs.recompra.negociando||0)):0)+(showNuevos?((kbs.nuevos.ni2||0)+(kbs.nuevos.nn||0)):0);

var _ETAPA_ACCION={
  interesado:'Llamar y proponer fecha concreta de visita o negociación',
  negociando:'Solicitar decisión — cerrar hoy o definir siguiente paso',
  ni2:'Confirmar interés — agendar llamada o visita',
  nn:'Presionar cierre — el cliente está listo para decidir'
};
function _etapaLabel(col){return{interesado:'Interesado',negociando:'Negociando',ni2:'Lead interesado',nn:'Lead negociando'}[col]||col;}

function _vendStats(vn,hoy,poolCarteras){
  var vCalls=DB.calls.filter(function(c){
    if(c.estado==='actividad')return false;
    if((c.userName||'').trim().toLowerCase()!==vn.toLowerCase())return false;
    if(poolCarteras&&poolCarteras.length)return poolCarteras.indexOf(c.carteraId)>=0;
    return true;
  });
  var callsHoy=vCalls.filter(function(c){return c.dateISO===hoy;});
  var calls7d=vCalls.filter(function(c){return(c.dateISO||'')>=monFechaHN(-6);});
  var lastCall=vCalls.slice().sort(function(a,b){return(b.dateISO||'')>(a.dateISO||'')?1:-1;})[0];
  var dago=lastCall?Math.round((new Date(hoy+'T12:00:00Z')-new Date(lastCall.dateISO+'T12:00:00Z'))/86400000):999;
  var uniqueCli7d=new Set(calls7d.map(function(c){return c.clientId;}).filter(Boolean)).size;
  var avgPerDia=calls7d.length?+(uniqueCli7d/7).toFixed(1):0;
  var estancados=[];
  // Solo interesado y negociando (cuenta activa NO cuenta como parado)
  var cartToCheck=poolCarteras&&poolCarteras.length?DB.carteras.filter(function(car){return poolCarteras.indexOf(car.id)>=0;}):DB.carteras;
  cartToCheck.forEach(function(car){
    (DB.clients[car.id]||[]).forEach(function(c){
      if(c.kbCol!=='interesado'&&c.kbCol!=='negociando')return;
      var myLast=vCalls.filter(function(x){return x.clientId===c.id;}).sort(function(a,b){return(b.dateISO||'')>(a.dateISO||'')?1:-1;})[0];
      if(!myLast)return;
      // Skip if another vendor has called this client more recently
      var hasNewerOther=DB.calls.some(function(x){return x.clientId===c.id&&(x.userName||'').trim().toLowerCase()!==vn.toLowerCase()&&(x.dateISO||'')>(myLast.dateISO||'');});
      if(hasNewerOther)return;
      var d=Math.round((new Date(hoy+'T12:00:00Z')-new Date(myLast.dateISO+'T12:00:00Z'))/86400000);
      if(d>=3)estancados.push({nombre:c.nombre||'Cliente',dias:d,col:c.kbCol,etapa:_etapaLabel(c.kbCol),tienda:car.name,accion:_ETAPA_ACCION[c.kbCol]||''});
    });
  });
  // Leads ni2/nn sin moverse 5+ días
  var myLeads=(DB.newLeads||[]).filter(function(l){return(l.assignedTo||l.createdBy||'').trim().toLowerCase()===vn.toLowerCase();});
  myLeads.forEach(function(l){
    if(l.leadCol!=='ni2'&&l.leadCol!=='nn')return;
    var parts=(l.createdAt||'').split('/');
    var dateStr=parts.length===3?(parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0')):(l.createdAt||'');
    if(!dateStr)return;
    var d=Math.round((new Date(hoy+'T12:00:00Z')-new Date(dateStr+'T12:00:00Z'))/86400000);
    if(d>=5)estancados.push({nombre:l.nombre,dias:d,col:l.leadCol,etapa:_etapaLabel(l.leadCol),tienda:'Leads',accion:_ETAPA_ACCION[l.leadCol]||''});
  });
  estancados.sort(function(a,b){return b.dias-a.dias;});
  return{name:vn,dago:dago,callsHoy:callsHoy.length,calls7d:calls7d.length,avgPerDia:avgPerDia,estancados:estancados,leadsCalientes:myLeads.filter(function(l){return l.leadCol==='ni2'||l.leadCol==='nn';}).length,totalLeads:myLeads.length,leadsCerrados:myLeads.filter(function(l){return l.leadCol==='nv';}).length,hasData:vCalls.length>0||myLeads.length>0};
}

// Helpers de entradas manuales de meta (localStorage)
function _mvKey(uid,cid,mes){return'mv_'+uid+'_'+cid+'_'+mes;}
function _getMV(uid,cid,mes){try{return JSON.parse(localStorage.getItem(_mvKey(uid,cid,mes))||'[]');}catch(e){return[];}}
function _saveMV(uid,cid,mes,arr){try{localStorage.setItem(_mvKey(uid,cid,mes),JSON.stringify(arr));}catch(e){}}
function _addMV(uid,cid,mes,unidades,monto){var arr=_getMV(uid,cid,mes);arr.push({ts:Date.now(),unidades:unidades||0,monto:monto||0});_saveMV(uid,cid,mes,arr);}
function _delMV(uid,cid,mes,ts){_saveMV(uid,cid,mes,_getMV(uid,cid,mes).filter(function(e){return e.ts!=ts;}));}

// Calcula ventas y monto vendido de un vendedor en una cartera (auto desde gestiones + manuales)
function _metaStats(userId,userName,carteraId,mes){
  var vn=(userName||'').trim().toLowerCase();
  var ano=mes.split('-')[0],mm=mes.split('-')[1];
  // Auto: gestiones con estado 'pago' en este mes para esta cartera
  var pagoG=DB.calls.filter(function(c){
    if(c.carteraId!==carteraId)return false;
    if(c.estado!=='pago')return false;
    if(!(c.dateISO||'').startsWith(mes))return false;
    return c.userId===userId||(c.userName||'').trim().toLowerCase()===vn;
  });
  var vendIds=[];
  pagoG.forEach(function(g){if(g.clientId&&vendIds.indexOf(g.clientId)<0)vendIds.push(g.clientId);});
  var autoMonto=0;
  var clientes=DB.clients[carteraId]||[];
  vendIds.forEach(function(cid){
    var cl=clientes.find(function(c){return c.id===cid;});
    if(!cl)return;
    (cl.payments||[]).forEach(function(p){
      if(!p.fecha)return;
      var pts=p.fecha.split('/');
      if(pts.length!==3)return;
      if(pts[2]===ano&&pts[1].padStart(2,'0')===mm)autoMonto+=(p.monto||0);
    });
  });
  var lista=vendIds.map(function(cid){var cl=clientes.find(function(c){return c.id===cid;});return cl?cl.nombre:cid;});
  // Manual: entradas registradas por el vendedor
  var mv=_getMV(userId,carteraId,mes);
  var mvU=mv.reduce(function(s,e){return s+(e.unidades||0);},0);
  var mvM=mv.reduce(function(s,e){return s+(e.monto||0);},0);
  return{ventas:vendIds.length+mvU,monto:autoMonto+mvM,lista:lista,manuales:mv,autoVentas:vendIds.length,autoMonto:autoMonto};
}

function _buildPoolTxt(pool,hoy,fechaTxt){
  var dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var fd=new Date(hoy+'T12:00:00Z');
  var META=8;
  var lines=['📊 ANÁLISIS — '+pool.label,'📅 '+dias[fd.getUTCDay()]+', '+fechaTxt,''];

  // Recopilar stats de todos los vendedores del pool (dedup por nombre)
  var seen=new Set();
  var allStats=[];
  pool.carteras.forEach(function(cid){
    DB.users.filter(function(u){
      if(u.role!=='vendedor'&&u.role!=='subadmin')return false;
      if(!u.name)return false;
      var k=u.name.trim().toLowerCase();
      if(seen.has(k))return false;
      var uc=Array.isArray(u.cartera)?u.cartera:[u.cartera||''];
      var firstPool=uc.find(function(c){return pool.carteras.indexOf(c)>=0;});
      if(firstPool!==cid)return false;
      seen.add(k);
      return true;
    }).forEach(function(u){allStats.push(_vendStats(u.name.trim(),hoy,pool.carteras));});
  });
  if(!allStats.length)return lines.join('\n');

  // Pipeline del pool
  var totalInteresado=0,totalNegociando=0;
  pool.carteras.forEach(function(cid){
    (DB.clients[cid]||[]).forEach(function(c){
      if(c.kbCol==='interesado')totalInteresado++;
      else if(c.kbCol==='negociando')totalNegociando++;
    });
  });

  // Situación general del equipo
  var activos=allStats.filter(function(r){return r.callsHoy>0;});
  var inactivos=allStats.filter(function(r){return r.callsHoy===0&&r.dago<999;});
  var nuncaEnt=allStats.filter(function(r){return r.dago>=999&&r.callsHoy===0;});
  var avgEquipo=allStats.length?+(allStats.reduce(function(s,r){return s+r.avgPerDia;},0)/allStats.length).toFixed(1):0;
  var pctMeta=Math.round((avgEquipo/META)*100);

  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('📈 RENDIMIENTO DEL EQUIPO');
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━');
  if(activos.length===allStats.length){
    lines.push('✅ Todo el equipo activo hoy ('+activos.length+' vendedor'+(activos.length>1?'es':'')+').');
  } else if(activos.length===0){
    lines.push('🔴 NINGÚN vendedor ha registrado gestiones hoy.');
  } else {
    lines.push('⚠️ '+activos.length+' de '+allStats.length+' vendedores activos hoy.');
    if(inactivos.length)lines.push('   Sin actividad hoy: '+inactivos.map(function(r){return r.name;}).join(', ')+'.');
  }
  lines.push('');
  lines.push('Promedio del equipo: '+avgEquipo+' clientes/día (meta: '+META+') — '+pctMeta+'% de la meta.');
  if(avgEquipo<META){
    var faltanTotal=allStats.reduce(function(s,r){return s+(META-Math.max(r.avgPerDia,0));},0);
    var faltanPorVend=+(faltanTotal/allStats.length).toFixed(1);
    lines.push('Para llegar a la meta, cada vendedor necesita agregar ~'+faltanPorVend+' contactos más por día.');
  } else {
    lines.push('🏆 ¡El equipo está cumpliendo la meta de '+META+' clientes/día!');
  }
  lines.push('');

  // Análisis por vendedor
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('👥 SITUACIÓN POR VENDEDOR');
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━');
  allStats.sort(function(a,b){return b.avgPerDia-a.avgPerDia;}).forEach(function(st){
    var icon=st.callsHoy>0?'✅':(st.dago>=999?'⛔':'🔴');
    lines.push('');
    if(st.dago>=999){
      lines.push(icon+' '+st.name+': Nunca ha registrado gestiones.');
      lines.push('   → Acción: Verificar que esté usando el sistema correctamente.');
      return;
    }
    if(st.callsHoy===0){
      lines.push(icon+' '+st.name+': Sin actividad hoy. Lleva '+st.dago+' días sin gestiones.');
      if(st.dago>=3)lines.push('   → URGENTE: Contactar para saber qué está pasando y retomar hoy mismo.');
      else lines.push('   → Recordar que la meta es '+META+' clientes diarios.');
    } else {
      lines.push(icon+' '+st.name+': '+st.callsHoy+' gestiones hoy · '+st.calls7d+' esta semana · promedio '+st.avgPerDia+'/día.');
      if(st.avgPerDia>=META){
        lines.push('   → ¡Cumpliendo la meta! Mantener el ritmo y enfocarse en cierres.');
      } else {
        var falta=+(META-st.avgPerDia).toFixed(1);
        lines.push('   → Está '+falta+' contactos/día por debajo de la meta. Agregar un bloque extra de llamadas.');
      }
    }
    if(st.estancados.length){
      lines.push('   Prospectos parados ('+st.estancados.length+'):');
      st.estancados.slice(0,3).forEach(function(e){
        var urgIcon=e.dias>=10?'🚨':e.dias>=5?'⚠️':'📌';
        lines.push('   '+urgIcon+' '+e.nombre+' — '+e.dias+' días en '+e.etapa+'.');
        lines.push('      → '+e.accion+'.');
      });
      if(st.estancados.length>3)lines.push('   ... y '+(st.estancados.length-3)+' más.');
    }
  });
  lines.push('');

  // Meta de ventas basada en pipeline
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('🎯 META DE VENTAS (PIPELINE ACTUAL)');
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━');
  if(totalInteresado+totalNegociando>0){
    var cierresEst=Math.round(totalNegociando*0.55+totalInteresado*0.25);
    lines.push('Pipeline activo: '+totalNegociando+' en negociación + '+totalInteresado+' interesados.');
    lines.push('Cierres estimados esta semana: '+cierresEst+(cierresEst===1?' venta':' ventas')+' (basado en tasas normales de conversión).');
    if(totalNegociando>0){
      lines.push('Prioridad #1: Los '+totalNegociando+' en negociación están listos para cerrar — no dejarlos enfriar.');
    }
    if(totalInteresado>0){
      lines.push('Prioridad #2: Convertir interesados a negociando: agendar visita o llamada concreta esta semana.');
    }
    if(cierresEst===0){
      lines.push('⚠️ Sin pipeline suficiente. Hay que generar prospectos nuevos urgentemente.');
    }
  } else {
    lines.push('⚠️ Sin prospectos activos en el pipeline.');
    lines.push('Acción inmediata: El equipo debe prospectar clientes nuevos y reactivar base de datos.');
  }
  lines.push('');

  // Plan de acción concreto
  var acciones=[];
  allStats.forEach(function(st){
    if(st.dago>=999)acciones.push('Verificar con '+st.name+' que esté usando el sistema.');
    else if(st.dago>=3&&st.callsHoy===0)acciones.push('Llamar a '+st.name+' hoy — lleva '+st.dago+' días sin actividad.');
    st.estancados.filter(function(e){return e.dias>=7;}).slice(0,2).forEach(function(e){
      acciones.push(st.name+': '+e.accion.toLowerCase().replace(/\.$/,'')+' con '+e.nombre+' ('+e.dias+' días esperando).');
    });
    if(st.avgPerDia>0&&st.avgPerDia<META){
      var f=+(META-st.avgPerDia).toFixed(1);
      if(f>=3)acciones.push(st.name+': agregar '+f+' contactos/día para cumplir la meta.');
    }
  });
  acciones=acciones.slice(0,5);
  if(acciones.length){
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push('📋 PLAN DE ACCIÓN — HOY');
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━');
    acciones.forEach(function(a,i){lines.push((i+1)+'. '+a);});
  }
  return lines.join('\n');
}

  if(alertas)h+='<span style="font-size:10px;background:#fbd38d44;color:#744210;padding:2px 8px;border-radius:10px;font-weight:700;">⚠️ '+alertas+' parados</span>';

  h+='<button onclick="dashWAPool(\''+pid+'\')" style="background:#25D366;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;">📤 WhatsApp</button>';
  h+='</div></div></div>';
  return h;

function buildReporteTxt(){
  var hoy=monFechaHN(0);
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var fd=new Date(hoy+'T12:00:00Z');
  var fechaTxt=fd.getUTCDate()+' de '+meses[fd.getUTCMonth()]+' '+fd.getUTCFullYear();
  var lines=['📊 Reporte del equipo — '+fechaTxt,''];
  var totalHoy=0;
  DB.carteras.forEach(function(car){
    var callsHoy=DB.calls.filter(function(c){return c.estado!=='actividad'&&c.carteraId===car.id&&c.dateISO===hoy;});
    if(!callsHoy.length)return;
    totalHoy+=callsHoy.length;
    var byVend={};
    callsHoy.forEach(function(c){var k=(c.userName||c.userId||'').trim();if(!k)return;if(!byVend[k])byVend[k]={g:0,cli:new Set()};byVend[k].g++;if(c.clientId)byVend[k].cli.add(c.clientId);});
    var uCli=new Set(callsHoy.map(function(c){return c.clientId;}).filter(Boolean));
    lines.push('🏪 '+car.name+': '+callsHoy.length+' gestiones · '+uCli.size+' clientes únicos');
    Object.keys(byVend).sort(function(a,b){return byVend[b].g-byVend[a].g;}).forEach(function(n){lines.push('   › '+n+': '+byVend[n].g+' gestiones');});
    lines.push('');
  });
  if(!totalHoy){lines.push('Sin actividad registrada hoy.');lines.push('');}
  var calR=0,calN=0;
  DB.carteras.forEach(function(car){(DB.clients[car.id]||[]).forEach(function(c){if(c.kbCol==='interesado'||c.kbCol==='negociando')calR++;});});
  (DB.newLeads||[]).forEach(function(l){if(l.leadCol==='ni2'||l.leadCol==='nn')calN++;});
  if(calR+calN>0){lines.push('🔥 Prospectos calientes: '+calR+' recompra · '+calN+' leads');lines.push('');}
  lines.push('📞 Total gestiones hoy: '+totalHoy);
  return lines.join('\n');
}

    if(u.role!=='vendedor'&&u.role!=='subadmin')return false;if(!u.name)return false;
    var k=u.name.trim().toLowerCase();if(seen.has(k))return false;seen.add(k);
    var uc=Array.isArray(u.cartera)?u.cartera:[u.cartera||''];
    return uc.some(function(c){return pool.carteras.indexOf(c)>=0;});
  });
  var stats=poolVendors.map(function(u){return _vendStats(u.name.trim(),hoy,pool.carteras);}).filter(function(r){return r.hasData;});
  var activos=stats.filter(function(r){return r.callsHoy>0;}).sort(function(a,b){return b.callsHoy-a.callsHoy;});
  var noActivos=stats.filter(function(r){return r.callsHoy===0;});
  if(activos.length){
    lines.push('✅ Trabajando hoy:');
    activos.forEach(function(r){lines.push('   › '+r.name+': '+r.callsHoy+' gestiones hoy · '+r.calls7d+' esta semana');});
    lines.push('');
  }
  if(noActivos.length){
    lines.push('⚠️ Sin actividad hoy:');
    noActivos.forEach(function(r){lines.push('   › '+r.name+' — '+(r.dago>=999?'nunca ingresó':r.dago+' días sin actividad'));});
    lines.push('');
  }
  var conE=stats.filter(function(r){return r.estancados.length>0;});
  if(conE.length){
    lines.push('🔴 Prospectos parados:');
    conE.forEach(function(r){r.estancados.slice(0,3).forEach(function(e){lines.push('   › '+r.name+' → '+e.nombre+' ('+e.etapa+' · '+e.dias+' días sin tocar)');});});
    lines.push('');
  }
  lines.push('📞 Total gestiones hoy (equipo): '+stats.reduce(function(s,r){return s+r.callsHoy;},0));
  return lines.join('\n');
}

function buildKBVendCounts(){

  } else {
    // Recompra: unique clients per vendor

function buildRRPanel(){
  var h='<div style="margin-top:14px;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">⚡ Rotación de asignación (Round-Robin)</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:10px;">';
  var st=getRRState();
  VENDOR_POOLS.forEach(function(pool){
    var vendors=getActiveVendorsForPool(pool);
    var last=st[pool.id]||'';
    var lastIdx=-1;for(var i=0;i<vendors.length;i++){if(vendors[i].name===last){lastIdx=i;break;}}
    var nextIdx=(lastIdx+1)%Math.max(1,vendors.length);
    // Count ALL leads assigned to each vendor (regardless of leadCartera)
    var counts={};(DB.newLeads||[]).forEach(function(l){if(l.assignedTo)counts[l.assignedTo]=(counts[l.assignedTo]||0)+1;});
    h+='<div style="flex:1;min-width:180px;background:#f7f9fc;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;">';
    h+='<div style="font-size:11px;font-weight:700;color:var(--t1);margin-bottom:6px;">'+pool.label+'</div>';
    if(!vendors.length){h+='<div style="font-size:11px;color:#c53030;">Sin vendedores activos</div>';}
    else{
      vendors.forEach(function(v,i){
        var isNext=i===nextIdx;
        var cnt=counts[v.name]||0;
        h+='<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #edf2f7;font-size:12px;">';

        h+='</div>';
      });
    }
    h+='</div>';
  });
  h+='</div></div>';
  return h;
}

function triggerUpload(){document.getElementById('up-file').click();}
function selCartUp(el){selCartId=el.dataset.cid;document.querySelectorAll('#cart-btns .ytab').forEach(function(t){t.classList.remove('on');});el.classList.add('on');var cart=DB.carteras.find(function(c){return c.id===selCartId;});document.getElementById('cart-lbl').innerHTML='<span style="color:var(--green);font-weight:600;">✅ '+(cart?cart.name:selCartId)+' seleccionada</span>';chkReady();}
function prepFile(inp){var f=inp.files[0];if(!f)return;pendingFile=f;document.getElementById('file-lbl').innerHTML='<span style="color:var(--green);font-weight:600;">✅ '+f.name+' ('+Math.round(f.size/1024)+' KB)</span>';chkReady();}
function chkReady(){var btn=document.getElementById('btn-upload');if(!btn)return;if(selCartId&&pendingFile){btn.style.opacity='1';btn.style.pointerEvents='auto';var cart=DB.carteras.find(function(c){return c.id===selCartId;});btn.textContent='3️⃣ Subir a "'+(cart?cart.name:selCartId)+'"';}else{btn.style.opacity='.35';btn.style.pointerEvents='none';}}
function doUpload(){if(!selCartId||!pendingFile)return;procFile(pendingFile);}
function initUpload(){var z=document.getElementById('up-zone');if(!z)return;z.addEventListener('dragover',function(e){e.preventDefault();z.style.borderColor='var(--blue)';z.style.background='var(--bluel)';});z.addEventListener('dragleave',function(){z.style.borderColor='';z.style.background='';});z.addEventListener('drop',function(e){e.preventDefault();z.style.borderColor='';z.style.background='';var f=e.dataTransfer.files[0];if(f){pendingFile=f;document.getElementById('file-lbl').innerHTML='<span style="color:var(--green);font-weight:600;">✅ '+f.name+'</span>';chkReady();}});}
function procFile(file){
  var status=document.getElementById('up-status');status.innerHTML='<span style="color:var(--blue);">⏳ Procesando archivo...</span>';
  var rt=new FileReader();
  rt.onload=function(e){
    try{var txt=e.target.result;if(txt&&(txt.includes('<table')||txt.includes('<TABLE'))){var doc=new DOMParser().parseFromString(txt,'text/html');var tbl=doc.querySelector('table');if(tbl){var rows=tbl.querySelectorAll('tr'),hdrs=[],res=[];rows.forEach(function(row,ri){var cells=row.querySelectorAll('th,td');if(!cells.length)return;if(ri===0){cells.forEach(function(c){hdrs.push((c.innerText||c.textContent||'').replace(/\s+/g,' ').trim());});return;}var obj={};cells.forEach(function(c,i){obj[hdrs[i]||'col'+i]=(c.innerText||c.textContent||'').replace(/\s+/g,' ').trim();});if(obj['Cliente']&&obj['Cliente'].length>2)res.push(obj);});if(res.length){importData(res,status);return;}}}}catch(ex){}
    var rb=new FileReader();
    rb.onload=function(e2){try{var txtL=new TextDecoder('iso-8859-1').decode(e2.target.result);if(txtL.includes('<table')){var doc2=new DOMParser().parseFromString(txtL,'text/html');var tbl2=doc2.querySelector('table');if(tbl2){var rows2=tbl2.querySelectorAll('tr'),hdrs2=[],res2=[];rows2.forEach(function(row,ri){var cells=row.querySelectorAll('th,td');if(!cells.length)return;if(ri===0){cells.forEach(function(c){hdrs2.push((c.innerText||c.textContent||'').trim());});return;}var obj={};cells.forEach(function(c,i){obj[hdrs2[i]||'col'+i]=(c.innerText||c.textContent||'').trim();});if(obj['Cliente']&&obj['Cliente'].length>2)res2.push(obj);});if(res2.length){importData(res2,status);return;}}}var wb=XLSX.read(e2.target.result,{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];importData(XLSX.utils.sheet_to_json(ws,{raw:false}),status);}catch(err){status.innerHTML='<span style="color:var(--red);">❌ Error: '+err.message+'</span>';}};
    rb.readAsArrayBuffer(file);
  };rt.readAsText(file,'utf-8');
}
function importData(data,status){
  var cid=selCartId;if(!data||!data.length){if(status)status.innerHTML='<span style="color:var(--red);">❌ Sin filas.</span>';return;}
  if(status)status.innerHTML='<span style="color:var(--blue);">⏳ Leyendo '+data.length+' filas...</span>';
  var map={};
  data.forEach(function(row){var nombre=(row['Cliente']||'').split('/')[0].trim().toUpperCase();if(!nombre)return;var est=(row['Estado pago']||row['Estado Pago']||'').toString().trim();if(!est.toLowerCase().includes('pagad'))return;if(!map[nombre])map[nombre]={nombre:nombre,payments:[]};map[nombre].payments.push({fecha:row['Fecha']||'',monto:parseFloat((row['cantidad']||'0').toString().replace(/,/g,''))||0,forma:row['Forma pago']||''});});
  var clients=Object.values(map).map(function(c,i){var pays=c.payments,monto=pays.reduce(function(s,p){return s+p.monto;},0);var fechas=pays.map(function(p){return p.fecha;}).filter(Boolean).sort();var ultimo=fechas[fechas.length-1]||'',primero=fechas[0]||'';var ant=0;if(primero){var pts=primero.split('/');var d=pts.length===3?new Date(pts[2],parseInt(pts[1])-1,parseInt(pts[0])):new Date(primero);if(!isNaN(d))ant=Math.round((Date.now()-d.getTime())/(1000*60*60*24*30.44)*10)/10;}var byM={};pays.forEach(function(p){if(!p.fecha)return;var pts=p.fecha.split('/');var k=pts.length===3?pts[2]+'-'+pts[1]:p.fecha.slice(0,7);byM[k]=(byM[k]||0)+1;});var m2=Object.values(byM).filter(function(v){return v>=2;}).length;return{id:cid+'_'+i+'_'+(Date.now()+i),nombre:c.nombre,payments:pays.slice(-6),totalPagos:pays.length,montoTotal:monto,ultimoPago:ultimo,primerPago:primero,antiguedad:ant,patron:m2>0?'Doble':'Mensual',estado:'pendiente',kbCol:null,kbComments:[]};});
  if(!DB.clients[cid])DB.clients[cid]=[];var ex=DB.clients[cid];var nv=0,ac=0;
  clients.forEach(function(nc){var idx=ex.findIndex(function(e){return e.nombre===nc.nombre;});if(idx>=0){var kept={estado:ex[idx].estado,telefono:ex[idx].telefono,direccion:ex[idx].direccion,kbCol:ex[idx].kbCol,kbComments:ex[idx].kbComments};ex[idx]=Object.assign({},ex[idx],nc,kept);ac++;}else{ex.push(nc);nv++;}});
  saveDB();
  var i2=0,batchSize=50;
  function uploadBatch(){if(i2>=ex.length){if(status)status.innerHTML='<span style="color:var(--green);font-weight:600;">✅ '+nv+' nuevos, '+ac+' actualizados</span>';toast(clients.length+' clientes importados en '+(DB.carteras.find(function(c){return c.id===cid;})||{name:cid}).name,'ok');return;}var batch=ex.slice(i2,i2+batchSize).map(function(c){return{id:c.id,cartera_id:cid,nombre:c.nombre,telefono:c.telefono||null,estado:c.estado||'pendiente',kb_col:c.kbCol||null,kb_comments:c.kbComments||[],total_pagos:c.totalPagos||0,monto_total:c.montoTotal||0,ultimo_pago:c.ultimoPago||null,primer_pago:c.primerPago||null,antiguedad:c.antiguedad||0,patron:c.patron||'Mensual',payments:c.payments||[]};});sbUp('clientes',batch).then(function(){i2+=batchSize;uploadBatch();});}
  uploadBatch();
}

  DB.carteras.forEach(function(c){var cc=(DB.clients[c.id]||[]).length;h+='<div class="cart-item"><div><span style="font-weight:700;font-size:14px;">'+c.name+'</span><span style="font-size:12px;color:var(--t2);margin-left:10px;">'+cc+' clientes cargados · ID: '+c.id+'</span></div><button class="btn-danger" style="font-size:12px;padding:6px 12px;" data-cid="'+c.id+'" data-cname="'+c.name+'" onclick="delCart(this)">🗑 Borrar</button></div>';});
  h+='</div>';
  h+='<div class="chart-card"><div class="chart-ttl">👥 Usuarios y accesos</div><div style="overflow-x:auto;"><table class="utbl"><thead><tr><th>Nombre</th><th>Rol</th><th>Cartera asignada</th><th>PIN</th><th>Gestiones</th><th></th></tr></thead><tbody>';
  sellers.forEach(function(u){var cart=DB.carteras.find(function(c){return c.id===u.cartera;});var rolCfg={admin:{lbl:'Admin',bg:'var(--bluel)',c:'var(--blue2)'},subadmin:{lbl:'Gerente',bg:'var(--amberl)',c:'#c05621'},vendedor:{lbl:'Vendedor',bg:'var(--greenl)',c:'#276749'}};var rc=rolCfg[u.role]||{lbl:u.role,bg:'#edf2f7',c:'var(--t2)'};h+='<tr><td><strong style="font-size:14px;">'+u.name+'</strong></td><td><span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:'+rc.bg+';color:'+rc.c+';">'+rc.lbl+'</span></td><td style="color:var(--t2);font-size:13px;">'+(Array.isArray(u.cartera)&&u.cartera.length?u.cartera.map(function(id){var c=DB.carteras.find(function(x){return x.id===id;});return c?c.name:id;}).join(', '):(u.cartera?u.cartera:'Todas'))+'</td><td><span style="font-family:monospace;font-size:16px;font-weight:700;color:var(--amber);letter-spacing:3px;">'+u.pin+'</span></td><td style="color:var(--t2);">'+DB.calls.filter(function(c){return c.estado!=='actividad'&&c.userId===u.id;}).length+'</td><td><button class="btn-sm" style="font-size:11px;padding:5px 10px;" data-uid="'+u.id+'" onclick="delUsr(this.dataset.uid)">Eliminar</button></td></tr>';});
  h+='</tbody></table></div></div></div>';return h;

function delCart(btn){var cid=btn.dataset.cid,cname=btn.dataset.cname;var cc=(DB.clients[cid]||[]).length;if(!confirm('¿Borrar la cartera "'+cname+'"?'+(cc>0?'\n\nTiene '+cc+' clientes. Se borrarán todos sus datos.':'')))return;delete DB.clients[cid];DB.carteras=DB.carteras.filter(function(c){return c.id!==cid;});DB.calls=DB.calls.filter(function(c){return c.carteraId!==cid;});DB.users.forEach(function(u){if(u.cartera===cid)u.cartera=null;});saveDB();sbDel('clientes','?cartera_id=eq.'+cid);sbDel('gestiones','?cartera_id=eq.'+cid);goTo('equipo');toast('Cartera "'+cname+'" eliminada','ok');}
function addCart(){var nm=prompt('Nombre de la nueva cartera:');if(!nm||!nm.trim())return;var id=prompt('ID interno (solo letras y números, sin espacios):');if(!id||!id.trim())return;var cleanId=id.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');if(DB.carteras.find(function(c){return c.id===cleanId;})){toast('Ese ID ya existe','err');return;}DB.carteras.push({id:cleanId,name:nm.trim()});saveDB();goTo('equipo');toast('Cartera "'+nm.trim()+'" creada ✓','ok');}
function openMovUsr(){openMov('mov-usr');initUF();}
function initUF(){
  var cc=document.getElementById('nu-cart-checks');
  if(cc){
    cc.innerHTML=DB.carteras.map(function(c){
      return '<label style="display:flex;align-items:center;gap:6px;padding:7px 12px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:13px;background:var(--card);"><input type="checkbox" value="'+c.id+'" style="width:16px;height:16px;cursor:pointer;accent-color:var(--blue);"> '+c.name+'</label>';
    }).join('');
  }
  document.getElementById('nu-nm').value='';
  document.getElementById('nu-pin').value='';
}
function saveUsr(){var name=document.getElementById('nu-nm').value.trim(),rol=document.getElementById('nu-rol').value,pin=document.getElementById('nu-pin').value.trim();
  var cartChecks=document.querySelectorAll('#nu-cart-checks input[type=checkbox]:checked');
  var cart=Array.from(cartChecks).map(function(cb){return cb.value;});
  if(cart.length===0)cart=[];if(!name||!pin){toast('Completa nombre y PIN','err');return;}if(!/^\d{4}$/.test(pin)){toast('El PIN debe ser exactamente 4 dígitos','err');return;}if(DB.users.find(function(u){return u.pin===pin;})){toast('Ese PIN ya está en uso — elige otro','err');return;}if(DB.users.find(function(u){return u.name.toLowerCase()===name.toLowerCase()&&u.role===rol;})){if(!confirm('Ya existe un usuario llamado "'+name+'" con el mismo rol. ¿Crear de todas formas?'))return;}var newU={id:'u'+Date.now(),name:name,pin:pin,role:rol,cartera:cart};DB.users.push(newU);var sbU=Object.assign({},newU,{cartera:JSON.stringify(newU.cartera)});saveDB();sbUp('usuarios',sbU);closeMov('mov-usr');goTo('equipo');toast('Usuario creado — PIN: '+pin,'ok');}
function delUsr(uid){
  var u=DB.users.find(function(x){return x.id===uid;});
  var calls=DB.calls.filter(function(c){return c.userId===uid;}).length;
  var msg=u?'¿Eliminar a "'+u.name+'"?'+(calls>0?' Tiene '+calls+' gestiones registradas.':''):'¿Eliminar?';
  if(!confirm(msg))return;
  DB.users=DB.users.filter(function(u){return u.id!==uid;});
  saveDB();goTo('equipo');toast('Usuario eliminado','ok');
}
function delUsersNoGest(){
  var sinGest=DB.users.filter(function(u){
    if(u.role==='admin')return false;
    return DB.calls.filter(function(c){return c.estado!=='actividad'&&(c.userId===u.id||c.userName===u.name);}).length===0;
  });
  if(!sinGest.length){toast('Todos los usuarios tienen gestiones','ok');return;}
  var names=sinGest.map(function(u){return u.name+' (PIN:'+u.pin+')'}).join('\n');
  if(!confirm('Eliminar '+sinGest.length+' usuarios sin gestiones:\n\n'+names))return;
  var ids=new Set(sinGest.map(function(u){return u.id;}));
  DB.users=DB.users.filter(function(u){return!ids.has(u.id);});
  saveDB();goTo('equipo');toast(sinGest.length+' usuarios eliminados','ok');
}


function vMonitor(){
  return '<div id="mon-wrap"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px;">'+

function monFechaHN(offset){
  // Honduras = UTC-6 siempre (no cambia horario)
  var now=new Date();
  var hnMs=now.getTime()-(6*60*60*1000);
  var hn=new Date(hnMs);
  hn.setUTCDate(hn.getUTCDate()+(offset||0));
  return hn.getUTCFullYear()+'-'+
    String(hn.getUTCMonth()+1).padStart(2,'0')+'-'+
    String(hn.getUTCDate()).padStart(2,'0');
}

function initMonitor(){
  monOffset=0;
  loadMonitor();
  if(window._monTimer)clearInterval(window._monTimer);
  window._monTimer=setInterval(function(){
    var ttl=document.getElementById('tb-ttl');
    if(ttl&&ttl.textContent==='Monitor')loadMonitor();
    else{clearInterval(window._monTimer);window._monTimer=null;}
  },60000);
}

async function openMonDetalle(nombre){
  // Buscar historial de los últimos 7 días para este vendedor
  var dias=[];
  for(var i=6;i>=0;i--){
    var d=new Date(Date.now()-(6*3600000));
    d.setUTCDate(d.getUTCDate()-i);
    dias.push(d.toISOString().slice(0,10));
  }
  // Filtrar calls de DB local
  // Traer directamente de Supabase para tener datos frescos
  var calls=[];
  try{
    var dias7start=new Date(Date.now()-(6*3600000));
    dias7start.setUTCDate(dias7start.getUTCDate()-6);
    var since=dias7start.toISOString().slice(0,10)+'T06:00:00.000Z';
    var r=await fetch(SB_URL+'/rest/v1/gestiones?select=*&user_name=eq.'+encodeURIComponent(nombre)+'&created_at=gte.'+encodeURIComponent(since)+'&order=created_at.desc',
      {headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Prefer':'count=none'}});
    if(r.ok)calls=await r.json();
  }catch(e){
    // fallback a localStorage
    calls=DB.calls.filter(function(x){return(x.userName||'').trim().toLowerCase()===nombre.trim().toLowerCase();});
  }
  // Modal overlay
  var ex=document.getElementById('mon-detalle-ov');if(ex)ex.remove();
  var ov=document.createElement('div');
  ov.id='mon-detalle-ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;';
  var box=document.createElement('div');
  box.style.cssText='background:#1e293b;border-radius:16px;width:100%;max-width:600px;margin:auto;border:1px solid #334155;';
  // Header
  var hdr=document.createElement('div');
  hdr.style.cssText='padding:18px 20px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;';
  hdr.innerHTML='<div><div style="font-size:16px;font-weight:700;color:#f8fafc;">📊 '+nombre+' — Últimos 7 días</div><div style="font-size:11px;color:#64748b;margin-top:3px;">Detalle de actividad por día</div></div>'+
    '<div onclick="document.getElementById(\'mon-detalle-ov\').remove()" style="width:32px;height:32px;background:#0f172a;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#94a3b8;">✕</div>';
  box.appendChild(hdr);
  // Body
  var body=document.createElement('div');
  body.style.cssText='padding:16px 20px;';
  var html='';
  dias.forEach(function(dia){
    // Normalizar campos snake_case de Supabase a camelCase
    calls=calls.map(function(x){return{
      id:x.id,clientId:x.client_id||x.clientId,carteraId:x.cartera_id||x.carteraId,
      userId:x.user_id||x.userId,userName:x.user_name||x.userName,
      dateISO:x.date_iso||x.dateISO,date:x.date_str||x.date,
      resultado:x.resultado,estado:x.estado,producto:x.producto,notas:x.notas
    };});
    var dCalls=calls.filter(function(x){
      var iso=x.dateISO||'';
      if(!iso&&x.date){var p=x.date.split('/');if(p.length===3)iso=p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');}
      return iso===dia;
    });
    // También buscar en gestiones de Supabase (las que están en DB.calls)
    var d=new Date(dia+'T12:00:00Z');
    var diasSemana=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    var dow=diasSemana[d.getUTCDay()];
    var esHoy=dia===monFechaHN(0);
    var esWE=d.getUTCDay()===0||d.getUTCDay()===6;
    // Agrupar por tipo
    var porTipo={};
    dCalls.forEach(function(x){
      var t=TIPOS[x.resultado]||'Gestion';
      if(!porTipo[t])porTipo[t]=[];
      porTipo[t].push(x);
    });
    var total=dCalls.length;
    var bg=total>0?'background:#0f172a;border:1px solid #22c55e33;':(esWE?'background:#0a0f1a;border:1px solid #1e293b;':'background:#0a0f1a;border:1px solid #1e293b;');
    html+='<div style="'+bg+'border-radius:10px;padding:12px 14px;margin-bottom:8px;">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:'+(total>0?'10':'0')+'px;">';
    html+='<div style="display:flex;align-items:center;gap:8px;">';
    html+='<span style="font-size:11px;font-weight:700;color:'+(esHoy?'#6366f1':'#94a3b8')+';">'+dow+' '+dia.slice(5)+'</span>';
    if(esHoy)html+='<span style="font-size:9px;background:#6366f133;color:#818cf8;padding:1px 6px;border-radius:99px;">HOY</span>';
    html+='</div>';
    html+='<span style="font-size:12px;font-weight:800;color:'+(total>0?'#22c55e':'#334155')+';">'+( total>0?total+' acciones':'Sin actividad')+'</span>';
    html+='</div>';
    if(total>0){
      Object.entries(porTipo).forEach(function(e){
        var tipo=e[0],items=e[1];
        var col=TIPO_COL[tipo]||'#94a3b8';
        var ic=TIPO_IC[tipo]||'●';
        html+='<div style="margin-bottom:6px;">';
        html+='<div style="font-size:10px;font-weight:700;color:'+col+';margin-bottom:3px;">'+ic+' '+tipo+' ('+items.length+')</div>';
        items.forEach(function(x){
          // Buscar nombre del cliente y tipo
          var clienteNombre='';
          var tipoCliente='';
          var tipoColor='';
          var resultado=(x.resultado||'').replace(/-/g,' ');
          var notas=x.notas?x.notas:'';
          var producto=x.producto?x.producto:'';

          if(x.resultado==='kanban-lead'||x.resultado==='comentario-lead'||x.resultado==='lead-nuevo'||x.carteraId==='leads'){
            // Cliente nuevo / lead
            tipoCliente='✨ Cliente Nuevo';
            tipoColor='#fb923c';
            // nombre guardado en producto field para actividades
            clienteNombre=x.producto||'';
          } else if(x.clientId){
            // Recompra — buscar en DB
            tipoCliente='🔄 Recompra';
            tipoColor='#60a5fa';
            var cid=x.carteraId||x.cartera_id;
            var cliId=x.clientId||x.client_id;
            var cl=(DB.clients[cid]||[]).find(function(z){return z.id===cliId;});
            if(cl)clienteNombre=cl.nombre;
            // Si no está en localStorage, usar el campo producto que puede tener el nombre
            if(!clienteNombre&&x.producto)clienteNombre=x.producto;
            // cartera name
            var cartObj=DB.carteras.find(function(z){return z.id===cid;});
            if(cartObj)tipoCliente='🔄 Recompra · '+cartObj.name;
          } else if(x.producto){
            // actividad registrada (kanban move etc) - nombre en producto
            clienteNombre=x.producto;
            tipoCliente=x.carteraId==='leads'?'✨ Cliente Nuevo':'🔄 Recompra';
            tipoColor=x.carteraId==='leads'?'#fb923c':'#60a5fa';
            var cartObj2=DB.carteras.find(function(z){return z.id===x.carteraId;});
            if(cartObj2&&x.carteraId!=='leads')tipoCliente='🔄 Recompra · '+cartObj2.name;
          }

          html+='<div style="padding:7px 10px;margin-bottom:5px;border-left:3px solid '+(tipoColor||col)+';background:#0f172a55;border-radius:0 8px 8px 0;">';
          if(tipoCliente)html+='<div style="font-size:9px;font-weight:700;color:'+(tipoColor||col)+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">'+tipoCliente+'</div>';
          if(clienteNombre)html+='<div style="font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:2px;">👤 '+clienteNombre+'</div>';
          if(resultado&&REALES.indexOf(x.resultado)>=0)html+='<div style="font-size:11px;color:'+col+';">'+resultado+'</div>';
          if(notas&&REALES.indexOf(x.resultado)>=0)html+='<div style="font-size:11px;color:#64748b;margin-top:1px;">📝 '+notas+'</div>';
          if(producto&&REALES.indexOf(x.resultado)<0)html+='<div style="font-size:11px;color:#94a3b8;">'+producto+'</div>';
          if(x.notas&&REALES.indexOf(x.resultado)<0)html+='<div style="font-size:11px;color:#64748b;">'+x.notas+'</div>';
          html+='</div>';
        });
        html+='</div>';
      });
    }
    html+='</div>';
  });
  body.innerHTML=html||'<div style="color:#475569;text-align:center;padding:20px;">Sin actividad en los últimos 7 días</div>';
  box.appendChild(body);
  ov.appendChild(box);
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
}
async function loadMonitor(){
  var fechaHN=monFechaHN(monOffset);
  var start=fechaHN+'T06:00:00.000Z';
  var nd=new Date(fechaHN+'T12:00:00Z');nd.setUTCDate(nd.getUTCDate()+1);
  var end=nd.toISOString().slice(0,10)+'T05:59:59.999Z';
  var since14=monFechaHN(-13)+'T06:00:00.000Z';

  var lbl=document.getElementById('mon-dia-label');
  var hoy=monFechaHN(0),ayer=monFechaHN(-1);
  if(lbl)lbl.textContent=(fechaHN===hoy?'Hoy':fechaHN===ayer?'Ayer':fechaHN)+' · '+fechaHN;

  var ga=document.getElementById('mon-grid-a'),gi=document.getElementById('mon-grid-i');
  if(ga)ga.innerHTML='<div style="color:var(--t3);padding:20px;text-align:center;">Cargando...</div>';
  if(gi)gi.innerHTML='';

  var HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'count=none'};
  async function sbGet(path){
    var r=await fetch(SB_URL+'/rest/v1/'+path,{headers:HDR});
    if(!r.ok)return[];
    return r.json();
  }

  var _eqSeen=new Set();
  var EQUIPO=DB.users.filter(function(u){
    if(u.role!=='vendedor'&&u.role!=='subadmin')return false;
    if(!u.name)return false;var k=u.name.trim().toLowerCase();
    if(_eqSeen.has(k))return false;_eqSeen.add(k);return true;
  }).map(function(u){return{name:u.name.trim()};});
  var LEAD_LABEL={nn:'Nuevo',nl:'Llamado',nc:'Contactado',ni2:'Interesado',nv:'Vendido'};
  var KB_LABEL={prospecto:'Prospecto',contactado:'Contactado',interesado:'Interesado',negociando:'Negociando',credito:'Crédito',vendido:'Vendido'};

  var [gestDia, gestHist, gestUlt] = await Promise.all([
    sbGet('gestiones?select=user_name,client_id,cartera_id,resultado&created_at=gte.'+encodeURIComponent(start)+'&created_at=lte.'+encodeURIComponent(end)),
    sbGet('gestiones?select=user_name,created_at&created_at=gte.'+encodeURIComponent(since14)+'&limit=9999'),
    sbGet('gestiones?select=user_name,created_at&order=created_at.desc&limit=9999')
  ]);

  // Gestiones del día
  var gMap={};
  if(Array.isArray(gestDia)){gestDia.forEach(function(g){
    var n=g.user_name;
    if(!gMap[n])gMap[n]={total:0,cli:new Set(),cart:new Set(),res:new Set(),tipos:{}};
    var esReal=REALES.indexOf(g.resultado)>=0;
    if(esReal){gMap[n].total++;if(g.client_id)gMap[n].cli.add(g.client_id);}
    if(g.cartera_id)gMap[n].cart.add(g.cartera_id);
    if(g.resultado)gMap[n].res.add(g.resultado);
    var tl=TIPOS[g.resultado]||'Gestion';
    gMap[n].tipos[tl]=(gMap[n].tipos[tl]||0)+1;
  });}

  // Historial 14d
  var hMap={};
  if(Array.isArray(gestHist)){gestHist.forEach(function(g){
    var n=g.user_name==='ANA'?'Ana Castro':g.user_name;
    var d=new Date(new Date(g.created_at).getTime()-6*3600000);
    var dia=d.toISOString().slice(0,10);
    if(!hMap[n])hMap[n]=new Set();
    hMap[n].add(dia);
  });}

  // Última actividad
  var ultMap={};
  if(Array.isArray(gestUlt)){gestUlt.forEach(function(g){
    var n=g.user_name==='ANA'?'Ana Castro':g.user_name;
    if(!ultMap[n])ultMap[n]=g.created_at;
  });}

  // Leads desde DB local
  var LEADS_STATIC={};
  var RECOMPRA_STATIC={};
  EQUIPO.forEach(function(v){
    var leads=(DB.newLeads||[]).filter(function(l){return(l.createdBy||'').trim().toLowerCase()===v.name.trim().toLowerCase();});
    var lm={};leads.forEach(function(l){var c=l.leadCol||'nl';lm[c]=(lm[c]||0)+1;});
    if(Object.keys(lm).length)LEADS_STATIC[v.name]=lm;
    // Recompra desde clientes DB
    var rm={};
    DB.carteras.forEach(function(car){
      (DB.clients[car.id]||[]).forEach(function(c){
        if(!c.kbCol)return;
        // Check if this vendedor managed this client
        var myCall=DB.calls.filter(function(x){return x.clientId===c.id&&(x.userName||'').trim().toLowerCase()===v.name.trim().toLowerCase();});
        if(myCall.length)rm[c.kbCol]=(rm[c.kbCol]||0)+1;
      });
    });
    if(Object.keys(rm).length)RECOMPRA_STATIC[v.name]=rm;
  });

  // 14 días
  var dias14=[];for(var i=13;i>=0;i--)dias14.push(monFechaHN(-i));

  function daysAgo(iso){
    if(!iso)return null;
    // Comparar solo fechas (sin horas) en zona Honduras
    var todayHN=monFechaHN(0);
    var ultHN=new Date(new Date(iso).getTime()-6*3600000).toISOString().slice(0,10);
    var ms=new Date(todayHN+'T12:00:00Z')-new Date(ultHN+'T12:00:00Z');
    return Math.round(ms/86400000);
  }

  function ultBloque(iso){
    if(!iso)return '<div style="border-radius:8px;padding:7px 10px;margin-top:6px;display:flex;align-items:center;gap:8px;background:#1e293b;border:1.5px solid #ef4444;animation:monPulse 2s infinite;"><span style="font-size:14px;">🚨</span><div><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">Última vez activo</div><div style="font-size:12px;font-weight:800;color:#ef4444;">NUNCA ha ingresado</div></div></div>';
    var d=daysAgo(iso);
    var fecha=new Date(iso).toLocaleDateString('es-HN',{day:'2-digit',month:'short'});
    var cls,icon,txt,bg,border;
    if(d<=0){cls='color:#22c55e';icon='🟢';txt='Hoy mismo';bg='rgba(34,197,94,.08)';border='#22c55e44';}
    else if(d===1){cls='color:#22c55e';icon='🟢';txt='Ayer';bg='rgba(34,197,94,.06)';border='#22c55e33';}
    else if(d<=4){cls='color:#f59e0b';icon='🟡';txt='Hace '+d+'d';bg='rgba(245,158,11,.08)';border='#f59e0b44';}
    else{cls='color:#ef4444';icon='🔴';txt='Hace '+d+' días';bg='rgba(239,68,68,.08)';border='#ef444444';}
    return '<div style="border-radius:8px;padding:7px 10px;margin-top:6px;display:flex;align-items:center;gap:8px;background:'+bg+';border:1.5px solid '+border+';">'+
      '<span style="font-size:14px;">'+icon+'</span>'+
      '<div><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">Última vez activo</div>'+
      '<div style="font-size:12px;font-weight:800;'+cls+';">'+txt+'</div>'+
      '<div style="font-size:10px;color:#64748b;">'+fecha+'</div></div></div>';
  }

  function makeMonCard(v,g,activo){
    var gest=g?g.total:0,cli=g?g.cli.size:0;
    var META_G=8,pctG=Math.min(100,Math.round(gest/META_G*100));
    // Colores según progreso
    var metaOk=gest>=META_G,metaMed=gest>=4;
    var gestCol=metaOk?'#16a34a':metaMed?'#d97706':'#dc2626';
    var cardBg=metaOk?'#f0fdf4':metaMed?'#fffbeb':'#fff5f5';
    var cardBorder=metaOk?'#86efac':metaMed?'#fcd34d':'#fca5a5';
    var barBg=metaOk?'#dcfce7':metaMed?'#fef3c7':'#fee2e2';
    var barFill=metaOk?'#22c55e':metaMed?'#f59e0b':'#ef4444';
    var numBg=metaOk?'#dcfce7':metaMed?'#fef9c3':'#fee2e2';
    if(!activo){cardBg='#f8fafc';cardBorder='#cbd5e1';gestCol='#64748b';barBg='#e2e8f0';barFill='#94a3b8';numBg='#f1f5f9';}

    // Dots historial 14 días
    var dots=dias14.map(function(d){
      var dow=new Date(d+'T12:00:00Z').getUTCDay();
      var we=dow===0||dow===6;
      var ok=(hMap[v.name]||new Set()).has(d);
      return '<div title="'+d+'" style="width:9px;height:9px;border-radius:2px;background:'+(we?'#e2e8f0':(ok?'#22c55e':'#e2e8f0'))+';border:1px solid '+(ok&&!we?'#16a34a':'#cbd5e1')+';"></div>';
    }).join('');

    // Última actividad bloque (versión clara)
    var ultIso=ultMap[v.name]||null;
    var dago=ultIso?daysAgo(ultIso):null;
    var ultTxt=!ultIso?'Nunca ingresó':dago===0?'Hoy':dago===1?'Ayer':'Hace '+dago+' días';
    var ultCol=!ultIso||dago>4?'#dc2626':dago>1?'#d97706':'#16a34a';

var _rtChannel=null,_rtRetry=null;
function connectRealtime(){
  if(_rtChannel)return;
  var wsUrl='wss://upaenjotkocmdvfuobii.supabase.co/realtime/v1/websocket?apikey='+SB_KEY+'&vsn=1.0.0';
  var ws;try{ws=new WebSocket(wsUrl);}catch(e){scheduleRetry();return;}
  var heartbeat;
  ws.onopen=function(){
    ws.send(JSON.stringify({topic:'realtime:public:gestiones',event:'phx_join',payload:{},ref:'1'}));
    ws.send(JSON.stringify({topic:'realtime:public:clientes',event:'phx_join',payload:{},ref:'2'}));
    ws.send(JSON.stringify({topic:'realtime:public:leads',event:'phx_join',payload:{},ref:'3'}));
    heartbeat=setInterval(function(){if(ws.readyState===1)ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'}));},25000);
  };
  ws.onmessage=function(e){
    try{
      var msg=JSON.parse(e.data);
      if(msg.event==='INSERT'||msg.event==='UPDATE'||msg.event==='DELETE'){
        if(!CU)return;
        if(document.getElementById('kb-modal-overlay')||document.querySelector('.mov.open'))return;
        loadFromSB().then(reRenderCurrent);
      }
    }catch(err){}
  };
  ws.onclose=function(){clearInterval(heartbeat);_rtChannel=null;if(CU)scheduleRetry();};
  ws.onerror=function(){ws.close();};
  _rtChannel=ws;
}
function scheduleRetry(){
  if(_rtRetry)return;
  _rtRetry=setTimeout(function(){_rtRetry=null;if(CU)connectRealtime();},5000);
}
function reRenderCurrent(){
  var ttl=document.getElementById('tb-ttl');if(!ttl)return;

    // Only re-render cards, preserve search text and filters
    renderCards();
  }
}

function waCargarRecomendacion(tel){

  .then(function(r){return r.json();})

    if(d.recomendacion){txt.textContent=d.recomendacion;}
    else{rec.style.display='none';}
  })

function waLoadMessages(tel){
  fetch(WA_URL+'/api/mensajes/'+encodeURIComponent(tel),{headers:{'ngrok-skip-browser-warning':'true'}})
  .then(function(r){return r.json();})
  .then(function(msgs){
    var el=document.getElementById('wa-msgs');if(!el)return;
    var wasAtBottom=el.scrollHeight-el.scrollTop-el.clientHeight<80;
    if(!msgs||!msgs.length){el.innerHTML='<div class="empty-st"><div class="ei">💬</div>Sin mensajes</div>';return;}
    var prevScroll=el.scrollTop;
    el.innerHTML=msgs.map(function(m){
      var out=m.direccion==='saliente';
      var t=new Date(m.timestamp).toLocaleTimeString('es-HN',{hour:'2-digit',minute:'2-digit'});
      var body='';
      if(m.media_url){
        var isPdf=m.media_url.toLowerCase().includes('.pdf')||(m.contenido||'').toLowerCase().includes('pdf');
        if(isPdf){
          var nombrePdf=m.contenido&&!m.contenido.includes('📄')?m.contenido:(m.media_url.split('/').pop()||'documento.pdf').replace(/^\d+-[a-z0-9]+\./,'')||'documento.pdf';
          var pdfHref=m.media_url.includes('twilio.com')?WA_URL+'/api/media-proxy?url='+encodeURIComponent(m.media_url):m.media_url;
          body+='<a href="'+pdfHref+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.06);padding:8px 12px;border-radius:8px;text-decoration:none;color:inherit;font-weight:600;margin-bottom:4px;">📄 '+nombrePdf+'</a>';
        } else {
          if(m.media_url.includes('twilio.com')){
            var imgId='wimg-'+Math.random().toString(36).slice(2);
            var cachedSrc=_waImgCache[m.media_url]||'';
            body+='<img id="'+imgId+'" src="'+cachedSrc+'" style="max-width:200px;border-radius:8px;display:block;margin-bottom:4px;min-height:'+(cachedSrc?'0':'40')+'px;background:'+(cachedSrc?'transparent':'#f0f0f0')+'" />';
            if(!cachedSrc){
              setTimeout(function(id,url){
                fetch(WA_URL+'/api/media-proxy?url='+encodeURIComponent(url),{headers:{'ngrok-skip-browser-warning':'true'}})
                .then(function(r){return r.blob();})
                .then(function(b){
                  var el=document.getElementById(id);if(!el)return;
                  if(b.type&&b.type.includes('pdf')){
                    var blobUrl=URL.createObjectURL(b);
                    _waImgCache[url]=blobUrl;
                    el.outerHTML='<a href="'+blobUrl+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.06);padding:8px 12px;border-radius:8px;text-decoration:none;color:inherit;font-weight:600;margin-bottom:4px;">📄 documento.pdf</a>';
                  } else {
                    var blobUrl=URL.createObjectURL(b);
                    _waImgCache[url]=blobUrl;
                    el.src=blobUrl;el.style.minHeight='0';el.style.background='transparent';
                  }
                })
                .catch(function(){});
              }.bind(null,imgId,m.media_url),0);
            }
          } else {
            body+='<img src="'+m.media_url+'" style="max-width:200px;border-radius:8px;display:block;margin-bottom:4px;" />';
          }
        }
      }
      body+=(m.contenido&&m.contenido!=='[📄 PDF]'&&m.contenido!=='[📷 Imagen]'?m.contenido:'');
      return '<div class="wa-bubble '+(out?'out':'in')+'">'+body+'<div class="wa-btime">'+t+'</div></div>';
    }).join('');
    if(wasAtBottom){el.scrollTop=el.scrollHeight;}else{el.scrollTop=prevScroll;}
  })
  .catch(function(e){console.error('wa-msgs:',e);});
}

function waSend(){
  var inp=document.getElementById('wa-inp');
  if(!inp||!waActivePhone)return;
  var msg=inp.value.trim();if(!msg)return;
  inp.value='';
  var conv=waConvs.find(function(c){return c.telefono===waActivePhone;})||{};
  if((conv.canal||'whatsapp')==='messenger'&&conv.messenger_id){
    fetch(WA_URL+'/api/responder-messenger',{method:'POST',headers:waH(),body:JSON.stringify({messenger_id:conv.messenger_id,mensaje:msg})})
    .then(function(){waLoadMessages(waActivePhone);waLoadConvs();})
    .catch(function(){toast('Error al enviar por Messenger','err');});
  } else {
    fetch(WA_URL+'/api/responder',{method:'POST',headers:waH(),body:JSON.stringify({telefono:waActivePhone,mensaje:msg})})
    .then(function(){waLoadMessages(waActivePhone);waLoadConvs();})
    .catch(function(){toast('Error al enviar','err');});
  }
}

function waUploadImg(input,tel){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    toast('Subiendo imagen...','');
    var fd=new FormData();
    fd.append('key','06b70a968773c7633233c9888d5afbcb');
    fd.append('image',base64);
    fetch('https://api.imgbb.com/1/upload',{method:'POST',body:fd})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.success)throw new Error('imgbb: '+(d.error?.message||'error'));
      var mediaUrl=d.data.url;
      return fetch(WA_URL+'/api/enviar-imagen-url',{
        method:'POST',headers:waH(),
        body:JSON.stringify({telefono:tel,mediaUrl:mediaUrl})
      });
    })
    .then(function(r){return r.json();})
    .then(function(){toast('Imagen enviada ✅','ok');waLoadMessages(tel);waLoadConvs();})
    .catch(function(e){toast('Error al enviar imagen','err');console.error(e);});
  };
  reader.readAsDataURL(file);
  input.value='';
}

function waUploadPDF(input,tel){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  if(file.size>10*1024*1024){toast('El PDF no puede pesar más de 10 MB','err');input.value='';return;}
  toast('Subiendo PDF...','');
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    fetch(WA_URL+'/api/upload-archivo-b64',{
      method:'POST',headers:waH(),
      body:JSON.stringify({base64:base64,nombre:file.name,tipo:file.type||'application/pdf'})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.url)throw new Error(d.error||'upload error');
      return fetch(WA_URL+'/api/enviar-imagen-url',{
        method:'POST',headers:waH(),
        body:JSON.stringify({telefono:tel,mediaUrl:d.url,contenido:'[📄 PDF]'})
      });
    })
    .then(function(r){return r.json();})
    .then(function(){toast('PDF enviado ✅','ok');waLoadMessages(tel);waLoadConvs();})
    .catch(function(e){toast('Error al enviar PDF','err');console.error(e);});
  };
  reader.readAsDataURL(file);
  input.value='';
}

function _botTeamCtx(hoy){
  var vendores=DB.users.filter(function(u){return(u.role==='vendedor'||u.role==='subadmin')&&u.name;});
  var seen=new Set();var lines=[];
  vendores.forEach(function(u){
    var k=u.name.trim().toLowerCase();if(seen.has(k))return;seen.add(k);
    var st=_vendStats(u.name.trim(),hoy,null);
    if(!st.hasData)return;
    lines.push(u.name.trim()+': gestiones hoy='+st.callsHoy+', últGest hace '+st.dago+'d, urgentes='+st.estancados.length
      +(st.estancados.length?'('+st.estancados.slice(0,3).map(function(e){return e.nombre+' '+e.dias+'d';}).join(', ')+')':'')+'.');
  });
  return lines.length?'Equipo hoy ('+hoy+'): '+lines.join(' | '):'Sin datos del equipo aún.';
}
function _botVendCtx(hoy,vn,cids){
  var st=_vendStats(vn,hoy,cids);

var _waMasivoEnviados=[];
var _waMasivoDesde='';

function waEntregaIcono(entrega,ok){
  if(!ok)return'<span style="color:#e74c3c;">❌</span>';
  if(entrega==='read')return'<span title="Leído" style="color:#25d366;font-weight:700;">✓✓👁</span>';
  if(entrega==='delivered')return'<span title="Entregado" style="color:#555;font-weight:700;">✓✓</span>';
  if(entrega==='sent')return'<span title="Enviado" style="color:#888;font-weight:700;">✓</span>';
  if(entrega==='failed'||entrega==='undelivered')return'<span style="color:#e74c3c;" title="Falló">⚠️</span>';
  return'<span style="color:#aaa;">✓</span>';
}

function waMasivoRenderTabla(resultados,estados){
  var estadoMap={};
  (estados||[]).forEach(function(e){estadoMap[e.telefono]=e;});
  var ok=resultados.filter(function(r){return r.ok;}).length;
  var fail=resultados.length-ok;
  var respondieron=(estados||[]).filter(function(e){return e.respondio;}).length;
  var rows=resultados.map(function(r){
    var est=estadoMap[r.telefono]||{};
    var entrega=r.ok?(est.entrega||r.entrega||'enviado'):'failed';
    var respondio=est.respondio||false;
    return'<tr style="border-bottom:1px solid var(--border);">'
    +'<td style="padding:6px 8px;">'+r.nombre+'</td>'
    +'<td style="padding:6px 8px;color:var(--muted);font-size:12px;">'+r.telefono+'</td>'
    +'<td style="padding:6px 8px;text-align:center;">'+waEntregaIcono(entrega,r.ok)+'</td>'
    +'<td style="padding:6px 8px;text-align:center;">'+(respondio?'<span title="Respondió" style="color:#25d366;">💬</span>':'<span style="color:#ccc;">—</span>')+'</td>'
    +'</tr>';
  }).join('');
  var body=document.getElementById('wa-masivo-body');
  if(!body)return;
  body.innerHTML='<div class="notice" style="margin-bottom:12px;display:flex;gap:16px;flex-wrap:wrap;">'
  +'<span><strong>✅ Enviados: '+ok+'/'+resultados.length+'</strong></span>'
  +(fail?'<span>❌ Fallaron: '+fail+'</span>':'')
  +'<span>💬 Respondieron: '+respondieron+'</span>'
  +'</div>'
  +'<div style="max-height:320px;overflow-y:auto;">'
  +'<table style="width:100%;border-collapse:collapse;font-size:13px;">'
  +'<thead><tr style="background:var(--bg2);">'
  +'<th style="padding:7px 8px;text-align:left;font-weight:600;">Nombre</th>'
  +'<th style="padding:7px 8px;text-align:left;font-weight:600;">Teléfono</th>'
  +'<th style="padding:7px 8px;text-align:center;font-weight:600;">Entrega</th>'
  +'<th style="padding:7px 8px;text-align:center;font-weight:600;">Respuesta</th>'
  +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
  +'<div style="font-size:11px;color:var(--muted);margin-top:8px;">✓ enviado &nbsp; ✓✓ entregado &nbsp; ✓✓👁 leído &nbsp; 💬 respondió</div>';
}

function waMasivoActualizarEstados(){
  if(!_waMasivoEnviados.length)return;
  var telefonos=_waMasivoEnviados.map(function(r){return r.telefono;}).join(',');
  fetch(WA_URL+'/api/masivo-estado?telefonos='+encodeURIComponent(telefonos)+'&desde='+encodeURIComponent(_waMasivoDesde),{headers:waH()})
  .then(function(r){return r.json();})
  .then(function(estados){waMasivoRenderTabla(_waMasivoEnviados,estados);})
  .catch(function(){});
}

function waEnviarMasivo(btn){
  var txtEl=document.getElementById('wa-masivo-txt');
  var plantilla=txtEl?txtEl.value.trim():'';
  if(!plantilla){toast('Escribe un mensaje primero','err');return;}
  btn.disabled=true;btn.textContent='Enviando...';
  _waMasivoDesde=new Date().toISOString();
  fetch(WA_URL+'/api/enviar-masivo',{method:'POST',headers:waH(),body:JSON.stringify({clientes:waPendingMasivo,plantilla:plantilla})})
  .then(function(r){return r.json();})
  .then(function(d){
    _waMasivoEnviados=d.resultados||[];
    waMasivoRenderTabla(_waMasivoEnviados,[]);
    // Botón actualizar estados
    btn.textContent='🔄 Actualizar estados';btn.disabled=false;
    btn.onclick=function(){waMasivoActualizarEstados();};
    // Botón cerrar en lugar del cancelar
    var prev=btn.previousElementSibling;
    if(prev){prev.textContent='Cerrar';prev.onclick=function(){this.closest('.mov').remove();};}
    // Actualizar automático a los 10s y 30s
    setTimeout(waMasivoActualizarEstados,10000);
    setTimeout(waMasivoActualizarEstados,30000);
    waLoadConvs();
  })
  .catch(function(){toast('Error en envío','err');btn.disabled=false;btn.textContent='Reintentar';});
}
